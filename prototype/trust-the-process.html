<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust the Process - The Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }
        body {
            font-family: 'Courier Prime', monospace;
            background: #1a1408;
            color: #3a3a3a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        #game-container {
            width: 960px;
            max-width: 100%;
            aspect-ratio: 960 / 640;
            background: #E0D8C8;
            border: 3px solid #5a5555;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        #screen {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .screen-panel {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }
        .screen-panel.active {
            display: flex;
        }

        /* ─ TITLE SCREEN ─ */
        #title-screen {
            justify-content: center;
            align-items: center;
            background: #E0D8C8;
        }
        .title-text {
            font-size: 48px;
            font-weight: bold;
            color: #3a3a3a;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-align: center;
        }
        .title-prompt {
            font-size: 20px;
            color: #5a5555;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,49% {opacity:1} 50%,100% {opacity:0.3} }

        /* ─ INTRO SCREEN ─ */
        #intro-screen {
            background: #E0D8C8;
            padding: 40px;
            flex-direction: column;
        }
        .intro-page { display: none; }
        .intro-page.active { display: block; }
        .intro-text {
            font-size: 16px;
            line-height: 1.6;
            color: #3a3a3a;
            margin-bottom: 20px;
        }
        .intro-nav {
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        /* ─ EXPLORATION SCREEN ─ */
        #exploration-screen {
            flex-direction: column;
            background: #E0D8C8;
        }
        .hud-bar {
            background: #3a3a3a;
            color: #E0D8C8;
            padding: 6px 10px;
            display: flex;
            gap: 15px;
            font-size: 11px;
            flex-wrap: wrap;
            border-bottom: 1px solid #5a5555;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-bar {
            width: 60px;
            height: 6px;
            background: #2a2a2a;
            border: 1px solid #E0D8C8;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            background: #7ade3d;
            transition: width 0.2s;
        }
        .room-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .room-title {
            background: #5a5555;
            color: #E0D8C8;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #3a3a3a;
        }
        .room-bg {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        .npc-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .npc-slot {
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .npc-slot:hover {
            transform: scale(1.15);
        }
        .npc-emoji {
            font-size: 48px;
            line-height: 1;
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.15));
        }
        .npc-label {
            font-size: 11px;
            font-weight: bold;
            color: #3a3a3a;
            margin-top: 2px;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 8px;
        }
        .nav-buttons button {
            padding: 5px 10px;
            background: #E0D8C8;
            color: #3a3a3a;
            border: 1px solid #5a5555;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            transition: background 0.2s;
        }
        .nav-buttons button:hover {
            background: #d0c8b8;
        }
        .dialogue-panel {
            background: #FFFFFF;
            border-top: 1px solid #5a5555;
            padding: 10px;
            height: 160px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .speaker-name {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            min-height: 14px;
        }
        .dialogue-text {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.3;
            color: #3a3a3a;
            word-wrap: break-word;
            margin-bottom: 4px;
        }
        .continue-prompt {
            font-size: 10px;
            color: #999;
            animation: blink 0.8s infinite;
            display: none;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .choice-btn {
            padding: 5px 8px;
            background: #f5f5f5;
            border: 1px solid #999;
            text-align: left;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            color: #333;
            transition: background 0.2s;
        }
        .choice-btn:hover {
            background: #e8e8e8;
        }

        /* ─ BATTLE SCREEN ─ */
        #battle-screen {
            flex-direction: column;
            background: #E0D8C8;
        }
        .battle-header {
            background: #5a5555;
            color: #E0D8C8;
            padding: 6px 10px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #3a3a3a;
        }
        .battle-area {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 15px;
            gap: 20px;
        }
        .combatant {
            text-align: center;
        }
        .combatant-emoji {
            font-size: 64px;
            line-height: 1;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }
        .combatant-emoji.hit {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-5deg); }
            75% { transform: translateX(8px) rotate(5deg); }
        }
        .combatant-name {
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
        }
        .battle-log {
            background: #FFFFFF;
            border-top: 1px solid #5a5555;
            padding: 8px;
            height: 100px;
            overflow-y: auto;
            font-size: 10px;
            line-height: 1.3;
        }
        .battle-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: #F5F5F5;
            border-top: 1px solid #5a5555;
        }
        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 5px 6px;
            background: #E0D8C8;
            border: 1px solid #5a5555;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
            font-size: 9px;
            color: #3a3a3a;
            transition: background 0.2s;
        }
        .action-btn:hover:not(:disabled) {
            background: #d0c8b8;
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .victory-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .victory-overlay.active {
            display: flex;
        }
        .victory-box {
            background: #FFFFFF;
            padding: 20px;
            border: 2px solid #5a5555;
            max-width: 300px;
            text-align: center;
            max-height: 250px;
            overflow-y: auto;
        }
        .victory-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #3a3a3a;
        }
        .victory-text {
            font-size: 10px;
            line-height: 1.4;
            color: #3a3a3a;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #E0D8C8; }
        ::-webkit-scrollbar-thumb { background: #5a5555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

        /* ─ MOBILE RESPONSIVE ─ */
        @media (max-width: 640px) {
            body {
                padding: 0;
                align-items: stretch;
            }
            #game-container {
                width: 100%;
                max-width: 100%;
                aspect-ratio: auto;
                height: 100vh;
                height: 100dvh;
                border: none;
                border-radius: 0;
                box-shadow: none;
            }

            /* Title */
            .title-text { font-size: 28px; margin-bottom: 24px; }
            .title-prompt { font-size: 16px; }

            /* Intro */
            #intro-screen { padding: 20px 16px; }
            .intro-text { font-size: 14px; }

            /* HUD — compact 2-row grid */
            .hud-bar {
                padding: 4px 8px;
                gap: 6px 12px;
                font-size: 10px;
            }
            .stat-bar { width: 45px; }

            /* Room area — compact, push NPCs near dialogue */
            .room-area {
                flex: 0 1 auto;
            }
            .room-bg {
                flex: 0 1 auto;
                padding: 10px 8px;
                justify-content: flex-end;
            }
            .npc-container { gap: 14px; }
            .npc-emoji { font-size: 40px; }
            .npc-label { font-size: 10px; }
            .room-title { font-size: 11px; padding: 6px; }

            /* Nav buttons — larger tap targets */
            .nav-buttons { padding: 6px; gap: 6px; }
            .nav-buttons button {
                padding: 8px 12px;
                font-size: 12px;
                min-height: 36px;
            }

            /* Dialogue — flex-sized, sits right under NPCs */
            .dialogue-panel {
                height: auto;
                flex: 1 1 auto;
                min-height: 100px;
                max-height: 40vh;
                padding: 10px 12px;
            }
            .speaker-name { font-size: 13px; }
            .dialogue-text { font-size: 13px; line-height: 1.4; }
            .continue-prompt { font-size: 11px; }
            .choice-btn {
                padding: 10px 12px;
                font-size: 13px;
                min-height: 40px;
            }

            /* Battle — stack vertically on narrow screens */
            .battle-header { font-size: 10px; padding: 5px 8px; }
            .battle-area {
                padding: 10px;
                gap: 10px;
                align-items: center;
            }
            .combatant-emoji { font-size: 48px; }
            .combatant-name { font-size: 10px; }

            .battle-log {
                height: 80px;
                font-size: 11px;
                padding: 6px 8px;
            }
            .battle-menu {
                gap: 4px;
                padding: 6px;
            }
            .action-btn {
                min-width: 60px;
                padding: 8px 6px;
                font-size: 11px;
                min-height: 36px;
            }

            /* Victory overlay */
            .victory-box {
                max-width: 85vw;
                padding: 16px;
            }
            .victory-title { font-size: 18px; }
            .victory-text { font-size: 12px; }
        }

        /* Extra small phones (SE, etc) */
        @media (max-width: 380px) {
            .title-text { font-size: 22px; }
            .npc-emoji { font-size: 32px; }
            .dialogue-panel { min-height: 100px; }
            .combatant-emoji { font-size: 36px; }
            .action-btn { min-width: 50px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="screen">
            <div id="title-screen" class="screen-panel active">
                <div class="title-text">TRUST THE PROCESS</div>
                <div class="title-text" style="font-size: 24px; margin-bottom: 60px;">THE SANCTUARY</div>
                <div class="title-prompt">Press SPACE or click to begin...</div>
            </div>

            <div id="intro-screen" class="screen-panel">
                <div id="intro-pages"></div>
                <div class="intro-nav">Click or press SPACE to advance | <span id="intro-page-num">1</span>/6</div>
            </div>

            <div id="exploration-screen" class="screen-panel">
                <div class="hud-bar">
                    <div class="stat-item">HP: <span id="hp-val">100</span>/<span id="hp-max">100</span> <div class="stat-bar"><div class="stat-fill" id="hp-bar" style="width: 100%;"></div></div></div>
                    <div class="stat-item">EP: <span id="ep-val">50</span>/<span id="ep-max">50</span> <div class="stat-bar"><div class="stat-fill" id="ep-bar" style="width: 100%; background: #3d7fd4;"></div></div></div>
                    <div class="stat-item">NORM: <span id="norm-val">90</span></div>
                    <div class="stat-item">INSIGHT: <span id="insight-val">0</span></div>
                    <div class="stat-item">🫘<span id="cacao-val">0</span></div>
                </div>
                <div class="room-area">
                    <div class="room-title" id="room-title">THE WELCOME PAVILION</div>
                    <div class="room-bg" id="room-bg">
                        <div class="npc-container" id="npc-container"></div>
                        <div class="nav-buttons" id="nav-buttons"></div>
                    </div>
                </div>
                <div class="dialogue-panel">
                    <div class="speaker-name" id="speaker-name"></div>
                    <div class="dialogue-text" id="dialogue-text"></div>
                    <div class="continue-prompt" id="continue-prompt">Click or SPACE to continue...</div>
                    <div class="choices-container" id="choices-container"></div>
                </div>
            </div>

            <div id="battle-screen" class="screen-panel">
                <div class="battle-header">
                    <div><span id="steve-hp-label">STEVE</span> <span id="steve-hp">100</span>/<span id="steve-hp-max">100</span> HP</div>
                    <div id="battle-turn-info" style="font-weight: bold;">Your Turn</div>
                    <div><span id="enemy-name-label">ENEMY</span> <span id="enemy-hp">50</span>/<span id="enemy-hp-max">50</span> HP</div>
                </div>
                <div class="battle-area">
                    <div class="combatant">
                        <div class="combatant-emoji" id="steve-emoji">👔📊</div>
                        <div class="combatant-name">STEVE</div>
                    </div>
                    <div style="font-size: 28px; font-weight: bold; color: #999; align-self: center;">VS</div>
                    <div class="combatant">
                        <div class="combatant-emoji" id="enemy-emoji">❓</div>
                        <div class="combatant-name" id="enemy-display-name">ENEMY</div>
                    </div>
                </div>
                <div class="battle-log" id="battle-log"></div>
                <div class="battle-menu" id="battle-menu">
                    <button class="action-btn" id="attack-btn">Attack</button>
                    <button class="action-btn" id="skills-btn">Skills</button>
                    <button class="action-btn" id="talk-btn">Talk</button>
                    <button class="action-btn" id="analyze-btn">Analyze</button>
                    <button class="action-btn" id="items-btn">Items</button>
                    <button class="action-btn" id="endure-btn">Endure</button>
                </div>
                <div class="victory-overlay" id="victory-overlay">
                    <div class="victory-box">
                        <div class="victory-title" id="victory-title">VICTORY</div>
                        <div class="victory-text" id="victory-text"></div>
                        <div style="font-size: 10px; color: #999; margin-top: 10px;">Click to continue...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        // GAME STATE
        // ═══════════════════════════════════════════════════════════════════
        const gameState = {
            screen: 'title',
            currentRoom: 'pavilion',
            hp: 100, maxHp: 100,
            ep: 50, maxEp: 50,
            normality: 90,
            insight: 0,
            cacao: 0,
            flags: {},
            inventory: [
                { id: 'pamphlet', name: 'Orientation Pamphlet', type: 'weapon', dmg: 5 },
                { id: 'polo', name: 'Steve\'s Polo Shirt', type: 'armor', def: 2 },
                { id: 'energy_bar', name: 'Energy Bar', type: 'consumable', heal: 20, qty: 3 }
            ],
            currentBattleEnemy: null,
            deathCount: 0,
            introPage: 0
        };

        // ═══════════════════════════════════════════════════════════════════
        // DIALOGUE DATA
        // ═══════════════════════════════════════════════════════════════════
        const dialogueData = {
            'receptionist': [
                { speaker: 'Receptionist', text: 'Namaste, beautiful soul! Welcome to The Sanctuary of Infinite Becoming. I can feel your energy from here. It\'s very... dense.' },
                { speaker: 'Steve', text: 'I have a reservation. Steve Stevens. The weekend package.' },
                { speaker: 'Receptionist', text: 'We don\'t use the word "reservation" here. You\'ve set an INTENTION to arrive, and the universe has honored it.' },
                { speaker: '', text: '(She opens a completely normal Excel spreadsheet.)', thought: true },
                { speaker: 'Receptionist', text: 'Before we begin, I\'ll need your phone, any watches, and anything with a screen. We\'re creating a sacred container free from digital interference.' },
                { speaker: '', text: '', choices: [
                    { text: '"My phone? Absolutely not."', next: 'receptionist_phone_no' },
                    { text: '"Fine. Take it."', next: 'receptionist_phone_yes' },
                    { text: '"Is there Wi-Fi here?"', next: 'receptionist_wifi' }
                ]}
            ],
            'receptionist_phone_no': [
                { speaker: 'Receptionist', text: 'I hear your resistance. That\'s beautiful. The attachment you feel is exactly what we\'re here to release. Also it\'s mandatory — it says so in the waiver you signed online. On your phone.' },
                { speaker: '', text: '(Steve reluctantly hands over his phone. He feels a phantom vibration in his pocket immediately.)', thought: true },
                { speaker: '', text: '', goto: 'receptionist_name' }
            ],
            'receptionist_phone_yes': [
                { speaker: 'Receptionist', text: 'Beautiful surrender. You\'re already doing the work.' },
                { speaker: '', text: '(Steve hands over his phone. He feels a phantom vibration in his pocket immediately.)', thought: true },
                { speaker: '', text: '', goto: 'receptionist_name' }
            ],
            'receptionist_wifi': [
                { speaker: 'Receptionist', text: 'We find that disconnecting from the digital realm allows us to connect more deeply with...' },
                { speaker: 'Receptionist', text: '(her voice drops to a whisper) ...there\'s none. There\'s no Wi-Fi. I haven\'t checked my email in nine weeks. I don\'t know what\'s happening out there. Is everything okay out there?' },
                { speaker: '', text: '(The smile returns.)', thought: true },
                { speaker: 'Receptionist', text: 'I mean — isn\'t that LIBERATING?' },
                { speaker: '', text: '(Steve hands over his phone.)', thought: true },
                { speaker: '', text: '', goto: 'receptionist_name' }
            ],
            'receptionist_name': [
                { speaker: 'Receptionist', text: 'Now! Every guest receives a Sanskrit name to honor their soul\'s essence. I\'m going to look into your eyes and channel the name that\'s been waiting for you across lifetimes.' },
                { speaker: '', text: '(She stares at Steve for an uncomfortable amount of time.)', thought: true },
                { speaker: 'Receptionist', text: '...Akash Prem. Sky Love.' },
                { speaker: 'Steve', text: 'My name is Steve.' },
                { speaker: 'Receptionist', text: 'Steve is the name your PARENTS gave you. Akash Prem is the name your SOUL chose before incarnation.' },
                { speaker: '', text: '(She hands you a name tag. It says "Akash Prem" in Comic Sans.)', thought: true },
                { speaker: '', text: '', goto: 'receptionist_wife' }
            ],
            'receptionist_wife': [
                { speaker: 'Steve', text: 'I\'m looking for my wife. She was here a few weeks ago?' },
                { speaker: 'Receptionist', text: 'We honor the privacy of all souls who pass through The Sanctuary. I can\'t share details about another person\'s journey.' },
                { speaker: 'Steve', text: 'She\'s my WIFE.' },
                { speaker: 'Receptionist', text: 'She\'s the universe\'s wife, Steve. We all belong to each other. And also to ourselves. Especially to ourselves.' },
                { speaker: 'Receptionist', text: 'I\'d invite you to settle in first. Attend a session. Let the land hold you. The answers you seek will come when you stop seeking them.' },
                { speaker: 'Receptionist', text: 'Here\'s a map of the grounds. Your assigned space is in the dorms. The kitchen serves at five. And remember — there are no strangers here, only fellow travelers.' },
                { speaker: '', text: '(She hands you a hand-drawn map on recycled paper. It smells like lavender.)', thought: true, callback: 'add_retreat_map' },
                { speaker: '', text: '(She touches her heart with both hands and bows. Steve is dismissed.)', thought: true },
                { speaker: 'Receptionist', text: 'Oh — one more thing. We don\'t use money here. The Sanctuary runs on cacao beans. Ceremonial currency. You\'ll find it\'s much more grounding than fiat.' },
                { speaker: 'Steve', text: 'You use chocolate as money.' },
                { speaker: 'Receptionist', text: 'We use CACAO as a medium of ENERGETIC EXCHANGE. Completely different. You\'ll receive some for participating in activities. The Cacao Dealer in the kitchen can help you spend it.' },
                { speaker: '', text: '(Steve decides not to ask why a place that rejects capitalism has a dealer.)', thought: true },
                { speaker: '', text: '(Maybe someone else here knows something. You should look around.)', thought: true, callback: 'talked_receptionist' }
            ],
            'receptionist_return': [
                { speaker: 'Receptionist', text: 'Welcome back, Akash Prem! How are you LANDING today?' }
            ],
            'oil_warrior': [
                { speaker: '???', text: 'Hey! Hey, wait! Can I just — have you heard of doTERRA?' },
                { speaker: 'Steve', text: 'No.' },
                { speaker: 'Essential Oil Warrior', text: 'It\'s not what you think. It\'s not a pyramid scheme. It\'s a WELLNESS ECOSYSTEM with a tiered distribution model.' },
                { speaker: 'Steve', text: 'That is exactly what a pyramid scheme is.' },
                { speaker: 'Essential Oil Warrior', text: 'A pyramid has a POINT at the TOP. This has a DIAMOND shape. Completely different geometry. Here — smell this.' },
                { speaker: '', text: '(She thrusts a tiny bottle toward your face. The smell hits you like a forest fire in a health food store.)', thought: true },
                { speaker: '', text: '', choices: [
                    { text: '"Get that away from me."', next: 'oil_fight' },
                    { text: '"How much do you actually make?"', next: 'oil_fight' },
                    { text: '(Try to walk away)', next: 'oil_fight' }
                ]}
            ],
            'oil_fight': [
                { speaker: 'Essential Oil Warrior', text: 'RECEIVE THIS BLESSING!' },
                { speaker: '', text: '(She throws peppermint oil at you. It burns. Combat is unavoidable.)', thought: true, callback: 'start_oil_battle' }
            ],
            'frank': [

        // DRAWING FUNCTION
        // ═══════════════════════════════════════════════════════════════════
        function drawStickFigure(canvas, emotion = 'neutral') {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#3a3a3a';
            ctx.fillStyle = '#3a3a3a';
            ctx.lineWidth = 1.5;

            const centerX = w / 2;
            const centerY = h * 0.2;

            // Head
            ctx.beginPath();
            ctx.arc(centerX, centerY, 9, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            if (emotion === 'happy') {
                ctx.fillRect(centerX - 6, centerY - 2, 2, 2);
                ctx.fillRect(centerX + 4, centerY - 2, 2, 2);
            } else if (emotion === 'scared') {
                ctx.beginPath();
                ctx.arc(centerX - 4, centerY - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(centerX + 4, centerY - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Body
            ctx.beginPath();
            ctx.moveTo(centerX, centerY + 9);
            ctx.lineTo(centerX, centerY + 30);
            ctx.stroke();

            // Arms
            ctx.beginPath();
            ctx.moveTo(centerX - 12, centerY + 15);
            ctx.lineTo(centerX + 12, centerY + 15);
            ctx.stroke();

            // Legs
            ctx.beginPath();
            ctx.moveTo(centerX - 6, centerY + 30);
            ctx.lineTo(centerX - 6, centerY + 55);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(centerX + 6, centerY + 30);
            ctx.lineTo(centerX + 6, centerY + 55);
            ctx.stroke();
        }

        function enterRoom(roomId) {
            gameState.currentRoom = roomId;
            const room = rooms[roomId];
            document.getElementById('room-title').textContent = room.name;
            document.getElementById('room-bg').style.background = room.color;

            // NPCs — check hide/show flags
            const npcContainer = document.getElementById('npc-container');
            npcContainer.innerHTML = '';
            room.npcs.forEach(npcId => {
                if (!npcs[npcId]) return;
                const npc = npcs[npcId];
                // Hide if defeat/hide flag is set
                if (npc.hideFlag && gameState.flags[npc.hideFlag]) return;
                // Only show if required flag is set
                if (npc.showFlag && !gameState.flags[npc.showFlag]) return;

                const slot = document.createElement('div');
                slot.className = 'npc-slot';
                slot.innerHTML = `<div class="npc-emoji">${npc.emoji}</div><div class="npc-label">${npc.name}</div>`;
                slot.onclick = () => {
                    // Use post-defeat dialogue if enemy was defeated
                    if (npc.postDefeatDialogue && npc.defeatFlag && gameState.flags[npc.defeatFlag]) {
                        startDialogue(npc.postDefeatDialogue);
                    // Use return dialogue if we've talked before
                    } else if (npc.returnDialogue && gameState.flags['talked_' + npcId]) {
                        startDialogue(npc.returnDialogue);
                    } else {
                        startDialogue(npc.dialogue);
                    }
                };
                npcContainer.appendChild(slot);
            });

            // Exits
            const navButtons = document.getElementById('nav-buttons');
            navButtons.innerHTML = '';
            room.exits.forEach(exit => {
                if (!exit.require || gameState.flags[exit.require]) {
                    const btn = document.createElement('button');
                    btn.textContent = exit.label;
                    btn.onclick = () => enterRoom(exit.room);
                    navButtons.appendChild(btn);
                }
            });

            // Clear dialogue
            clearDialogue();
        }

        function clearDialogue() {
            document.getElementById('speaker-name').textContent = '';
            document.getElementById('dialogue-text').textContent = '';
            document.getElementById('choices-container').innerHTML = '';
            document.getElementById('continue-prompt').style.display = 'none';
        }

        // ═══════════════════════════════════════════════════════════════════
        // DIALOGUE
        // ═══════════════════════════════════════════════════════════════════
        let currentDialogue = null;
        let dialogueIndex = 0;

        function startDialogue(treeId) {
            currentDialogue = dialogueData[treeId];
            if (!currentDialogue) return;
            dialogueIndex = 0;
            showDialogueLine();
        }

        function showDialogueLine() {
            if (!currentDialogue || dialogueIndex >= currentDialogue.length) {
                currentDialogue = null;
                clearDialogue();
                return;
            }

            const line = currentDialogue[dialogueIndex];

            // Handle goto
            if (line.goto) {
                startDialogue(line.goto);
                return;
            }

            // Handle callback
            if (line.callback) {
                executeCallback(line.callback);
            }

            // Handle choices
            if (line.choices) {
                document.getElementById('speaker-name').textContent = '';
                document.getElementById('dialogue-text').textContent = '';
                document.getElementById('continue-prompt').style.display = 'none';
                const container = document.getElementById('choices-container');
                container.innerHTML = '';
                line.choices.forEach((choice, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice.text;
                    btn.onclick = () => selectChoice(i, choice);
                    container.appendChild(btn);
                });
                return;
            }

            // Clear any leftover choices from previous line
            document.getElementById('choices-container').innerHTML = '';

            // Display line
            const text = line.text || '';
            const speaker = line.speaker || '';
            const npcData = Object.values(npcs).find(n => n.name === speaker);
            const color = npcData ? npcData.color : '#3a3a3a';

            document.getElementById('speaker-name').textContent = speaker;
            document.getElementById('speaker-name').style.color = color;
            document.getElementById('dialogue-text').textContent = text;
            document.getElementById('dialogue-text').style.color = line.thought ? '#999' : color;

            if (text.trim()) {
                document.getElementById('continue-prompt').style.display = 'block';
            } else {
                dialogueIndex++;
                showDialogueLine();
            }
        }

        function selectChoice(index, choice) {
            if (choice.callback) executeCallback(choice.callback);
            if (choice.next) {
                startDialogue(choice.next);
            } else {
                clearDialogue();
            }
        }

        function advanceDialogue() {
            if (!currentDialogue) return;
            dialogueIndex++;
            showDialogueLine();
        }

        // ═══════════════════════════════════════════════════════════════════
        // CALLBACKS
        // ═══════════════════════════════════════════════════════════════════
        function executeCallback(name) {
            switch(name) {
                case 'map_obtained':
                    gameState.flags['map_obtained'] = true;
                    break;
                case 'talked_frank':
                    gameState.flags['talked_frank'] = true;
                    gameState.insight++;
                    break;
                case 'talked_maya':
                    gameState.flags['talked_maya'] = true;
                    break;
                case 'talked_brandon':
                    gameState.flags['talked_brandon'] = true;
                    break;
                case 'firepit_done':
                    gameState.flags['firepit_done'] = true;
                    gameState.flags['night_mode'] = true;
                    gameState.insight += 2;
                    break;
                case 'circle_done':
                    gameState.flags['circle_done'] = true;
                    gameState.flags['night_mode'] = true;
                    break;
                case 'meditator_intel':
                    gameState.flags['meditator_intel'] = true;
                    gameState.insight++;
                    break;
                case 'gatekeeper_cleared':
                    gameState.flags['gatekeeper_cleared'] = true;
                    break;
                case 'start_oil_battle':
                    gameState.currentBattleEnemy = 'oil_warrior';
                    startBattle();
                    return;
                case 'start_meditator_battle':
                    gameState.currentBattleEnemy = 'meditator';
                    startBattle();
                    return;
                case 'start_gatekeeper_battle':
                    gameState.currentBattleEnemy = 'gatekeeper';
                    startBattle();
                    return;
                case 'start_founder_battle':
                    gameState.currentBattleEnemy = 'founder';
                    startBattle();
                    return;
                case 'add_coffee':
                    if (gameState.cacao >= 80) {
                        gameState.cacao -= 80;
                        gameState.inventory.push({ id: 'coffee', name: 'Actual Coffee', heal: 30, qty: 1 });
                    }
                    break;
                case 'add_cacao_drink':
                    if (gameState.cacao >= 50) {
                        gameState.cacao -= 50;
                        gameState.inventory.push({ id: 'cacao_drink', name: 'Cacao Drink', heal: 20, qty: 1 });
                    }
                    break;
                case 'add_kombucha':
                    if (gameState.cacao >= 20) {
                        gameState.cacao -= 20;
                        gameState.inventory.push({ id: 'kombucha', name: 'Kombucha', heal: 10, qty: 1 });
                    }
                    break;
                case 'add_wifi_password':
                    if (gameState.cacao >= 100) {
                        gameState.cacao -= 100;
                        gameState.inventory.push({ id: 'wifi_password', name: 'WiFi Password (scribbled on napkin)', type: 'key' });
                    }
                    break;
                case 'add_retreat_map':
                    gameState.flags['map_obtained'] = true;
                    break;
                case 'add_insight':
                    gameState.insight++;
                    break;
                case 'breathwork_heal':
                    gameState.ep = gameState.maxEp;
                    break;
                case 'talked_receptionist':
                    gameState.flags['talked_receptionist'] = true;
                    break;
                case 'end_walk':
                    startDialogue('departure');
                    return;
            }
            updateHUD();

            phase1HP: 0
        };

        function startBattle() {
            showScreen('battle');
            const enemyId = gameState.currentBattleEnemy;
            battleState.enemy = JSON.parse(JSON.stringify(enemyDB[enemyId]));
            battleState.phase = 1;
            battleState.playerTurn = true;
            battleState.isOver = false;

            if (battleState.enemy.isBoss) {
                battleState.phase1HP = 30;
            }

            updateBattleDisplay();
            logBattle(battleState.enemy.intro);
            document.getElementById('victory-overlay').classList.remove('active');
        }

        function updateBattleDisplay() {
            document.getElementById('steve-hp').textContent = gameState.hp;
            document.getElementById('steve-hp-max').textContent = gameState.maxHp;
            if (battleState.enemy.isBoss && battleState.phase === 1) {
                document.getElementById('enemy-hp').textContent = battleState.phase1HP;
                document.getElementById('enemy-hp-max').textContent = 30;
            } else {
                document.getElementById('enemy-hp').textContent = battleState.enemy.hp;
                document.getElementById('enemy-hp-max').textContent = battleState.enemy.maxHp;
            }
            document.getElementById('enemy-name-label').textContent = battleState.enemy.name;
            document.getElementById('enemy-display-name').textContent = battleState.enemy.name;

            // Steve's emoji reacts to health
            const steveEmoji = document.getElementById('steve-emoji');
            if (gameState.hp < 20) steveEmoji.textContent = '😵📊';
            else if (gameState.hp < 40) steveEmoji.textContent = '😰📊';
            else steveEmoji.textContent = '👔📊';

            // Enemy emoji — boss phases change appearance
            const enemyEmoji = document.getElementById('enemy-emoji');
            if (battleState.enemy.isBoss) {
                if (battleState.phase === 1) enemyEmoji.textContent = battleState.enemy.emoji;
                else if (battleState.phase === 2) enemyEmoji.textContent = battleState.enemy.phase2Emoji || battleState.enemy.emoji;
                else enemyEmoji.textContent = battleState.enemy.phase3Emoji || battleState.enemy.emoji;
            } else {
                if (battleState.enemy.hp < battleState.enemy.maxHp * 0.3) {
                    enemyEmoji.textContent = battleState.enemy.emoji.replace(/💥|💢/, '😫');
                } else {
                    enemyEmoji.textContent = battleState.enemy.emoji;
                }
            }
        }

        function logBattle(msg) {
            const log = document.getElementById('battle-log');
            log.innerHTML += msg + '<br>';
            log.scrollTop = log.scrollHeight;
        }

        function shakeEmoji(id) {
            const el = document.getElementById(id);
            el.classList.remove('hit');
            void el.offsetWidth; // reflow to restart animation
            el.classList.add('hit');
        }

        function dealEnemyDmg(dmg) {
            shakeEmoji('enemy-emoji');
            if (battleState.enemy.isBoss && battleState.phase === 1) {
                battleState.phase1HP = Math.max(0, battleState.phase1HP - dmg);
            } else {
                battleState.enemy.hp = Math.max(0, battleState.enemy.hp - dmg);
            }
        }

        function isEnemyDefeated() {
            if (battleState.enemy.isBoss && battleState.phase === 1) {
                return battleState.phase1HP <= 0;
            }
            return battleState.enemy.hp <= 0;
        }

        function advanceBossPhase() {
            if (battleState.phase === 1) {
                battleState.phase = 2;
                logBattle('───────────────');
                logBattle('Brandon collapses. "I haven\'t eaten in three days..."');
                logBattle('Phase 2: Derek steps forward!');
                battleState.enemy.name = 'THE FOUNDER';
                updateBattleDisplay();
                battleState.playerTurn = true;
                document.getElementById('battle-turn-info').textContent = 'Your Turn';
                return true;
            }
            return false;
        }

        function executeAction(action) {
            if (!battleState.playerTurn || battleState.isOver) return;
            battleState.playerTurn = false;
            document.getElementById('battle-turn-info').textContent = 'Enemy Turn';
            battleState.enduring = false;

            switch(action) {
                case 'attack': {
                    const dmg = 5 + Math.floor(Math.random() * 3);
                    dealEnemyDmg(dmg);
                    logBattle(`Steve attacks with the Orientation Pamphlet! ${dmg} damage!`);
                    break;
                }
                case 'spreadsheet': {
                    if (gameState.ep >= 5) {
                        gameState.ep -= 5;
                        if (battleState.enemy.isBoss && battleState.phase === 1) {
                            dealEnemyDmg(15);
                            logBattle('"Brandon, you donated $2,400 to a gratitude fund with no receipts." 15 damage!');
                        } else if (battleState.enemy.weakness === 'bureaucratic') {
                            const d = battleState.enemy.hp;
                            dealEnemyDmg(d);
                            logBattle(`CRITICAL! Bureaucratic damage obliterates financial delusion! ${d} damage!`);
                        } else {
                            dealEnemyDmg(20);
                            logBattle('Spreadsheet Analysis deals 20 bureaucratic damage!');
                        }
                    } else {
                        logBattle('Not enough EP!');
                        battleState.playerTurn = true;
                        return;
                    }
                    break;
                }
                case 'schedule': {
                    if (gameState.ep >= 4) {
                        gameState.ep -= 4;
                        logBattle('"I\'ve blocked out 15 minutes for this conflict." Extra action!');
                        battleState.playerTurn = true;
                        updateBattleDisplay();
                        document.getElementById('battle-turn-info').textContent = 'Your Turn';
                        return;
                    }
                    break;
                }
                case 'risk': {
                    if (gameState.ep >= 3) {
                        gameState.ep -= 3;
                        battleState.enemy.def = Math.max(0, (battleState.enemy.def || 0) - 2);
                        logBattle('Risk Assessment: Enemy defense reduced!');
                    }
                    break;
                }
                case 'audit': {
                    if (gameState.ep >= 8) {
                        gameState.ep -= 8;
                        dealEnemyDmg(25);
                        battleState.enemy.def = 0;
                        logBattle('FULL AUDIT! 25 damage and all defenses stripped!');
                    }
                    break;
                }
                case 'analyze':
                    logBattle('═══ ANALYSIS ═══');
                    logBattle(`Type: ${battleState.enemy.name}`);
                    logBattle(`Weakness: ${battleState.enemy.weakness}`);
                    logBattle(`HP: ${battleState.enemy.isBoss && battleState.phase === 1 ? battleState.phase1HP + '/30' : battleState.enemy.hp + '/' + battleState.enemy.maxHp}`);
                    if (battleState.enemy.analyzeText) logBattle(battleState.enemy.analyzeText);
                    battleState.playerTurn = true;
                    document.getElementById('battle-turn-info').textContent = 'Your Turn';
                    updateBattleDisplay();
                    return;
                case 'endure':
                    battleState.enduring = true;
                    logBattle('Steve grits his teeth. Damage reduced this turn.');
                    logBattle('(He thinks about his desk. His ergonomic chair. The hum of fluorescent lighting.)');
                    break;
                case 'talk_boundary':
                    if (battleState.enemy.isBoss && battleState.phase === 1) {
                        dealEnemyDmg(12);
                        logBattle('"Brandon, when was the last time you ate?" Brandon blinks. 12 damage!');
                    } else {
                        logBattle('"I\'m not interested. Thank you." Enemy stunned!');
                        updateBattleDisplay();
                        setTimeout(() => { battleState.playerTurn = true; document.getElementById('battle-turn-info').textContent = 'Your Turn'; }, 600);
                        return;
                    }
                    break;
                case 'talk_question':
                    if (battleState.enemy.isBoss && battleState.phase === 1) {
                        dealEnemyDmg(15);
                        logBattle('"Brandon, where\'s your watch? The one your dad gave you?" 15 damage!');
                    } else {
                        dealEnemyDmg(8);
                        logBattle('Steve asks a deeply uncomfortable question. 8 psychic damage!');
                    }
                    break;
                case 'talk_bore':
                    dealEnemyDmg(6);
                    logBattle('Steve explains FIFO vs LIFO inventory methods. 6 boredom damage.');
                    break;
                case 'talk_validate':
                    if (battleState.enemy.isBoss && battleState.phase === 1) {
                        dealEnemyDmg(10);
                        logBattle('"Brandon, you\'re a good person. That\'s why he chose you." 10 damage!');
                    } else {
                        battleState.enemy.atk = Math.max(5, (battleState.enemy.atk || 12) - 3);
                        logBattle('"It sounds like you really believe in what you\'re doing." Attack power drops.');
                    }
                    break;
                case 'items': {
                    const consumable = gameState.inventory.find(i => i.heal && (i.qty || 0) > 0);
                    if (consumable) {
                        const heal = Math.min(consumable.heal, gameState.maxHp - gameState.hp);
                        gameState.hp += heal;
                        consumable.qty--;
                        if (consumable.qty <= 0) {
                            gameState.inventory = gameState.inventory.filter(i => i.id !== consumable.id);
                        }
                        logBattle(`Steve uses ${consumable.name}. Restored ${heal} HP!`);
                    } else {
                        logBattle('No items!');
                        battleState.playerTurn = true;
                        return;
                    }
                    break;
                }
            }

            updateBattleDisplay();
            updateHUD();

            // Check phase transition or defeat
            if (isEnemyDefeated()) {
                if (battleState.enemy.isBoss && battleState.phase === 1) {
                    advanceBossPhase();
                    return;
                }
                endBattle(true);
                return;
            }

            setTimeout(enemyTurn, 600);
        }

        function enemyTurn() {
            if (battleState.isOver) return;

            // Pick attacks based on boss phase
            let attacks;
            if (battleState.enemy.isBoss && battleState.phase === 1) {
                attacks = battleState.enemy.phase1Attacks || battleState.enemy.attacks;
            } else if (battleState.enemy.isBoss && battleState.phase >= 2 && battleState.enemy.hp <= 15) {
                if (battleState.phase === 2) {
                    battleState.phase = 3;
                    logBattle('Derek is desperate! Phase 3!');
                }
                attacks = battleState.enemy.phase3Attacks || battleState.enemy.attacks;
            } else {
                attacks = battleState.enemy.attacks || [];
            }

            const attack = attacks[Math.floor(Math.random() * attacks.length)] || { name: 'Flail', dmg: 5, msg: 'The enemy flails.' };

            logBattle(`${battleState.enemy.name} uses ${attack.name}!`);
            logBattle(attack.msg);

            if (attack.dmg) {
                let dmg = attack.dmg + Math.floor(Math.random() * 4 - 2);
                if (battleState.enduring) {
                    dmg = Math.floor(dmg / 2);
                    logBattle('(Endure reduces damage!)');
                }
                dmg = Math.max(1, dmg);
                gameState.hp = Math.max(0, gameState.hp - dmg);
                shakeEmoji('steve-emoji');
                logBattle(`Steve takes ${dmg} damage!`);
            }

            // Apply effects
            if (attack.effect === 'defend') {
                battleState.enemy.def = (battleState.enemy.def || 0) + 3;
                logBattle('Enemy defense increased!');
            } else if (attack.effect === 'smudge') {
                logBattle('Steve is Smudged! (Accuracy -20% for 3 turns)');
            } else if (attack.effect === 'boss_buff') {
                battleState.enemy.atk = (battleState.enemy.atk || 18) + 2;
                battleState.enemy.def = (battleState.enemy.def || 0) + 2;
                logBattle('Derek restructures mid-fight! ATK and DEF increase!');
            }

            updateBattleDisplay();
            updateHUD();

            if (gameState.hp <= 0) {
                endBattle(false);
            } else {
                battleState.playerTurn = true;
                document.getElementById('battle-turn-info').textContent = 'Your Turn';
            }
        }

        function endBattle(won) {
            battleState.isOver = true;
            const overlay = document.getElementById('victory-overlay');
            const title = document.getElementById('victory-title');
            const text = document.getElementById('victory-text');

            if (won) {
                title.textContent = 'VICTORY';
                gameState.insight += battleState.enemy.xp;
                gameState.cacao += battleState.enemy.cacao;

                // Set the correct defeat flag
                const defeatFlagMap = {
                    'oil_warrior': 'oil_defeated',
                    'meditator': 'meditator_defeated',
                    'gatekeeper': 'gatekeeper_cleared',
                    'founder': 'founder_defeated',
                };
                const flagKey = defeatFlagMap[gameState.currentBattleEnemy] || '';
                if (flagKey) gameState.flags[flagKey] = true;

                // Handle post-boss choices
                if (gameState.currentBattleEnemy === 'founder') {
                    text.innerHTML = `${battleState.enemy.defeat}<br><br>+${battleState.enemy.xp} Insight  +${battleState.enemy.cacao} Cacao<br><br>What do you do with the documents?`;
                    // Add ending choice buttons to overlay
                    const btnContainer = document.createElement('div');
                    btnContainer.style.cssText = 'display:flex; flex-direction:column; gap:8px; margin-top:12px;';
                    const choices = [
                        { text: 'Walk away with your wife\'s letter', next: 'founder_end_walk' },
                        { text: 'Restructure the Sanctuary (Steve can\'t help himself)', next: 'founder_end_restructure' },
                        { text: 'Send everything to the authorities', next: 'founder_end_destroy' },
                    ];
                    choices.forEach(c => {
                        const btn = document.createElement('button');
                        btn.textContent = c.text;
                        btn.style.cssText = 'padding:8px 16px; font-family:inherit; font-size:16px; cursor:pointer; background:#f0ece4; border:1px solid #999; border-radius:4px;';
                        btn.onclick = () => {
                            overlay.classList.remove('active');
                            showScreen('exploration');
                            enterRoom(gameState.currentRoom);
                            setTimeout(() => startDialogue(c.next), 300);
                        };
                        btnContainer.appendChild(btn);
                    });
                    text.appendChild(btnContainer);
                } else {
                    text.innerHTML = `${battleState.enemy.defeat}<br><br>+${battleState.enemy.xp} Insight  +${battleState.enemy.cacao} Cacao`;
                }
            } else {
                // EGO DEATH
                const deathMessages = [
                    "You had what the community calls 'a breakthrough.' You call it 'losing consciousness.'",
                    "Steve lay on the floor. Someone was already burning sage.",
                    "As Steve's vision faded, he heard: 'Should we call 911?' 'No, get the essential oils.'",
                    "Steve respawned. He hated that he thought the word 'respawned.'",
                    "The singing bowl brings you back. You briefly saw the void. It looked like a spreadsheet.",
                ];
                gameState.deathCount = (gameState.deathCount || 0) + 1;
                const msg = deathMessages[gameState.deathCount % deathMessages.length];
                title.textContent = 'EGO DEATH';
                text.innerHTML = `${msg}<br><br>Steve wakes up in the dorms.<br>HP restored to ${Math.floor(gameState.maxHp / 2)}. Normality -5.`;
                gameState.hp = Math.floor(gameState.maxHp / 2);
                gameState.ep = Math.floor(gameState.maxEp / 2);
                gameState.normality = Math.max(0, gameState.normality - 5);
                gameState.currentRoom = 'dorms';
            }

            updateHUD();
            overlay.classList.add('active');
        }

        // ═══════════════════════════════════════════════════════════════════
        // EVENT LISTENERS
        // ═══════════════════════════════════════════════════════════════════
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.screen === 'title') {
                    startIntro();
                } else if (gameState.screen === 'intro') {
                    advanceIntro();
                } else if (gameState.screen === 'exploration') {
                    if (document.getElementById('continue-prompt').style.display !== 'none') {
                        advanceDialogue();
                    }
                } else if (gameState.screen === 'battle' && battleState.isOver) {
                    showScreen('exploration');
                    enterRoom(gameState.currentRoom);
                }
            }
        });

        document.addEventListener('click', () => {
            if (gameState.screen === 'title') {
                startIntro();
            } else if (gameState.screen === 'intro') {
                advanceIntro();
            } else if (gameState.screen === 'exploration') {
                if (document.getElementById('continue-prompt').style.display !== 'none') {
                    advanceDialogue();
                }
            } else if (gameState.screen === 'battle' && battleState.isOver) {
                showScreen('exploration');
                enterRoom(gameState.currentRoom);
            }
        });

        document.getElementById('attack-btn').onclick = () => executeAction('attack');
        document.getElementById('analyze-btn').onclick = () => executeAction('analyze');
        document.getElementById('endure-btn').onclick = () => executeAction('endure');

        // Skills submenu
        document.getElementById('skills-btn').onclick = () => {
            const menu = document.getElementById('battle-menu');
            menu.innerHTML = '';
            const skills = [
                { label: `Spreadsheet [5 EP]`, action: 'spreadsheet', ok: gameState.ep >= 5 },
                { label: `Schedule Opt [4 EP]`, action: 'schedule', ok: gameState.ep >= 4 },
                { label: `Risk Assess [3 EP]`, action: 'risk', ok: gameState.ep >= 3 },
            ];
            if (gameState.insight >= 2) {
                skills.push({ label: `Audit [8 EP]`, action: 'audit', ok: gameState.ep >= 8 });
            }
            skills.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.textContent = s.label;
                btn.disabled = !s.ok;
                btn.onclick = () => { restoreMainMenu(); executeAction(s.action); };
                menu.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'action-btn';
            back.textContent = '← Back';
            back.onclick = restoreMainMenu;
            menu.appendChild(back);
        };

        // Talk submenu
        document.getElementById('talk-btn').onclick = () => {
            const menu = document.getElementById('battle-menu');
            menu.innerHTML = '';
            const talks = [
                { label: 'Set Boundary', action: 'talk_boundary' },
                { label: 'Question', action: 'talk_question' },
                { label: 'Bore', action: 'talk_bore' },
                { label: 'Validate', action: 'talk_validate' },
            ];
            talks.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.textContent = t.label;
                btn.onclick = () => { restoreMainMenu(); executeAction(t.action); };
                menu.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'action-btn';
            back.textContent = '← Back';
            back.onclick = restoreMainMenu;
            menu.appendChild(back);
        };

        // Items button
        document.getElementById('items-btn').onclick = () => executeAction('items');

        function restoreMainMenu() {
            const menu = document.getElementById('battle-menu');
            menu.innerHTML = `
                <button class="action-btn" id="attack-btn">Attack</button>
                <button class="action-btn" id="skills-btn">Skills</button>
                <button class="action-btn" id="talk-btn">Talk</button>
                <button class="action-btn" id="analyze-btn">Analyze</button>
                <button class="action-btn" id="items-btn">Items</button>
                <button class="action-btn" id="endure-btn">Endure</button>
            `;
            // Re-bind all handlers
            document.getElementById('attack-btn').onclick = () => executeAction('attack');
            document.getElementById('skills-btn').onclick = document.getElementById('skills-btn').onclick;
            document.getElementById('talk-btn').onclick = document.getElementById('talk-btn').onclick;
            document.getElementById('analyze-btn').onclick = () => executeAction('analyze');
            document.getElementById('items-btn').onclick = () => executeAction('items');
            document.getElementById('endure-btn').onclick = () => executeAction('endure');
            // Need to rebind skills and talk submenus
            bindMenuButtons();
        }

        function bindMenuButtons() {
            document.getElementById('attack-btn').onclick = () => executeAction('attack');
            document.getElementById('analyze-btn').onclick = () => executeAction('analyze');
            document.getElementById('endure-btn').onclick = () => executeAction('endure');
            document.getElementById('items-btn').onclick = () => executeAction('items');
            document.getElementById('skills-btn').onclick = () => {
                const menu = document.getElementById('battle-menu');
                menu.innerHTML = '';
                const skills = [
                    { label: `Spreadsheet [5 EP]`, action: 'spreadsheet', ok: gameState.ep >= 5 },
                    { label: `Schedule Opt [4 EP]`, action: 'schedule', ok: gameState.ep >= 4 },
                    { label: `Risk Assess [3 EP]`, action: 'risk', ok: gameState.ep >= 3 },
                ];
                if (gameState.insight >= 2) {
                    skills.push({ label: `Audit [8 EP]`, action: 'audit', ok: gameState.ep >= 8 });
                }
                skills.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.textContent = s.label;
                    btn.disabled = !s.ok;
                    btn.onclick = () => { restoreMainMenu(); executeAction(s.action); };
                    menu.appendChild(btn);
                });
                const back = document.createElement('button');
                back.className = 'action-btn';
                back.textContent = '← Back';
                back.onclick = restoreMainMenu;
                menu.appendChild(back);
            };
            document.getElementById('talk-btn').onclick = () => {
                const menu = document.getElementById('battle-menu');
                menu.innerHTML = '';
                const talks = [
                    { label: 'Set Boundary', action: 'talk_boundary' },
                    { label: 'Question', action: 'talk_question' },
                    { label: 'Bore', action: 'talk_bore' },
                    { label: 'Validate', action: 'talk_validate' },
                ];
                talks.forEach(t => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.textContent = t.label;
                    btn.onclick = () => { restoreMainMenu(); executeAction(t.action); };
                    menu.appendChild(btn);
                });
                const back = document.createElement('button');
                back.className = 'action-btn';
                back.textContent = '← Back';
                back.onclick = restoreMainMenu;
                menu.appendChild(back);
            };
        }
        bindMenuButtons();

        // Initialize
        updateHUD();
    </script>
</body>
</html>

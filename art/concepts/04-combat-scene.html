<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Combat Scene — Steve vs. The Essential Oil Warrior</title>
<style>
  body { margin: 0; background: #0a0805; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1600" height="900"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1600, H = 900;

function hsl(h,s,l,a=1) { return `hsla(${h},${s}%,${l}%,${a})`; }
function hexToRgb(hex) { hex=hex.replace('#',''); return [parseInt(hex.substr(0,2),16),parseInt(hex.substr(2,2),16),parseInt(hex.substr(4,2),16)]; }
function rgba(r,g,b,a) { return `rgba(${r},${g},${b},${a})`; }
function softCircle(x,y,r,color,alpha=1) {
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,rgba(...hexToRgb(color),alpha));
  g.addColorStop(1,rgba(...hexToRgb(color),0));
  ctx.fillStyle=g;
  ctx.fillRect(x-r,y-r,r*2,r*2);
}

// ============================
// BACKGROUND: Garden/clearing, dramatic battle lighting
// ============================
ctx.fillStyle = '#0c0a08';
ctx.fillRect(0, 0, W, H);

// Dramatic clash lighting — purple vs green
softCircle(1100, 350, 500, '#3a1848', 0.3);  // Oil Warrior energy (purple)
softCircle(450, 380, 500, '#1a3a20', 0.25);   // Steve's mundane green energy

// Central clash point
softCircle(780, 350, 200, '#d4a34a', 0.08);

// Speed lines radiating from center (anime action!)
const clashX = 780, clashY = 350;
for (let i = 0; i < 80; i++) {
  const angle = Math.random() * Math.PI * 2;
  const innerR = 250 + Math.random() * 100;
  const outerR = innerR + 100 + Math.random() * 300;
  ctx.beginPath();
  ctx.moveTo(clashX + Math.cos(angle) * innerR, clashY + Math.sin(angle) * innerR);
  ctx.lineTo(clashX + Math.cos(angle) * outerR, clashY + Math.sin(angle) * outerR);
  ctx.strokeStyle = hsl(40, 30, 50, 0.03 + Math.random() * 0.04);
  ctx.lineWidth = 1 + Math.random() * 2;
  ctx.stroke();
}

// Ground
const groundY = 620;
const groundGrad = ctx.createLinearGradient(0, groundY - 30, 0, H);
groundGrad.addColorStop(0, '#1a1c10');
groundGrad.addColorStop(0.3, '#18180e');
groundGrad.addColorStop(1, '#10100a');
ctx.fillStyle = groundGrad;
ctx.fillRect(0, groundY - 30, W, H - groundY + 30);

// Scattered flowers and grass
for (let i = 0; i < 300; i++) {
  const x = Math.random() * W;
  const y = groundY + Math.random() * (H - groundY - 120);
  const h = 3 + Math.random() * 8;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + Math.random() * 3 - 1.5, y - h);
  ctx.strokeStyle = hsl(80 + Math.random() * 40, 25, 18 + Math.random() * 10, 0.3);
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ============================
// STEVE (left side, defensive stance with briefcase shield)
// ============================
const sx = 380, sy = 340;

function setOutline(w, color='#1a1208') {
  ctx.strokeStyle = color;
  ctx.lineWidth = w;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

// ---- Steve's shadow ----
ctx.save();
ctx.translate(sx, groundY + 10);
ctx.scale(1, 0.12);
ctx.beginPath();
ctx.arc(0, 0, 120, 0, Math.PI * 2);
ctx.fillStyle = 'rgba(0,0,0,0.25)';
ctx.fill();
ctx.restore();

// ---- LEGS (defensive stance, weight back) ----
// Left leg (back)
ctx.beginPath();
ctx.moveTo(sx - 25, sy + 180);
ctx.quadraticCurveTo(sx - 50, sy + 220, sx - 55, sy + 270);
ctx.strokeStyle = '#8a8068';
ctx.lineWidth = 30;
ctx.lineCap = 'round';
ctx.stroke();
setOutline(3);
ctx.beginPath();
ctx.moveTo(sx - 12, sy + 175);
ctx.quadraticCurveTo(sx - 38, sy + 218, sx - 42, sy + 272);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(sx - 38, sy + 180);
ctx.quadraticCurveTo(sx - 62, sy + 222, sx - 68, sy + 270);
ctx.stroke();

// Right leg (forward)
ctx.beginPath();
ctx.moveTo(sx + 10, sy + 180);
ctx.quadraticCurveTo(sx + 20, sy + 220, sx + 15, sy + 270);
ctx.strokeStyle = '#8a8068';
ctx.lineWidth = 30;
ctx.lineCap = 'round';
ctx.stroke();
setOutline(3);
ctx.beginPath();
ctx.moveTo(sx + 22, sy + 178);
ctx.quadraticCurveTo(sx + 32, sy + 220, sx + 28, sy + 272);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(sx - 2, sy + 182);
ctx.quadraticCurveTo(sx + 8, sy + 220, sx + 2, sy + 272);
ctx.stroke();

// Shoes
function drawShoe(x, y, dir) {
  ctx.beginPath();
  ctx.moveTo(x - 8, y);
  ctx.quadraticCurveTo(x - 10, y + 10, x - 6, y + 16);
  ctx.lineTo(x + dir * 22, y + 16);
  ctx.quadraticCurveTo(x + dir * 26, y + 12, x + dir * 24, y + 6);
  ctx.quadraticCurveTo(x + dir * 16, y - 2, x + 8, y);
  ctx.closePath();
  ctx.fillStyle = '#3a2a18';
  ctx.fill();
  setOutline(2.5);
  ctx.stroke();
}
drawShoe(sx - 55, sy + 268, -1);
drawShoe(sx + 15, sy + 268, 1);

// ---- TORSO (polo, slightly twisted) ----
ctx.beginPath();
ctx.moveTo(sx - 55, sy + 10);
ctx.quadraticCurveTo(sx - 60, sy + 100, sx - 40, sy + 185);
ctx.lineTo(sx + 35, sy + 185);
ctx.quadraticCurveTo(sx + 55, sy + 100, sx + 50, sy + 10);
ctx.closePath();
const poloGrad = ctx.createLinearGradient(sx - 60, sy, sx + 60, sy + 185);
poloGrad.addColorStop(0, '#4a6a4a');
poloGrad.addColorStop(0.6, '#3a5a3a');
poloGrad.addColorStop(1, '#2a4a2a');
ctx.fillStyle = poloGrad;
ctx.fill();
setOutline(3.5);
ctx.stroke();

// Belt
ctx.beginPath();
ctx.moveTo(sx - 40, sy + 175);
ctx.lineTo(sx + 36, sy + 175);
ctx.strokeStyle = '#3a3028';
ctx.lineWidth = 10;
ctx.stroke();
// Buckle
ctx.beginPath();
ctx.roundRect(sx - 6, sy + 170, 12, 10, 2);
ctx.fillStyle = '#b8a060';
ctx.fill();

// Collar
ctx.beginPath();
ctx.moveTo(sx - 22, sy + 5);
ctx.quadraticCurveTo(sx, sy + 20, sx + 22, sy + 5);
ctx.strokeStyle = '#3a5a3a';
ctx.lineWidth = 3;
ctx.stroke();

// ---- RIGHT ARM: HOLDING BRIEFCASE UP AS SHIELD ----
ctx.beginPath();
ctx.moveTo(sx + 50, sy + 15);
ctx.quadraticCurveTo(sx + 80, sy - 20, sx + 110, sy - 50);
ctx.strokeStyle = '#4a6a4a';
ctx.lineWidth = 30;
ctx.lineCap = 'round';
ctx.stroke();
// Forearm skin
ctx.beginPath();
ctx.moveTo(sx + 90, sy - 30);
ctx.quadraticCurveTo(sx + 110, sy - 60, sx + 120, sy - 80);
ctx.strokeStyle = '#c8a882';
ctx.lineWidth = 20;
ctx.lineCap = 'round';
ctx.stroke();

// BRIEFCASE AS SHIELD
ctx.save();
ctx.translate(sx + 135, sy - 90);
ctx.rotate(-0.3);

// Briefcase body
ctx.beginPath();
ctx.roundRect(-50, -40, 100, 75, 5);
const briefGrad = ctx.createLinearGradient(-50, -40, 50, 35);
briefGrad.addColorStop(0, '#6a5030');
briefGrad.addColorStop(0.5, '#5a4020');
briefGrad.addColorStop(1, '#4a3018');
ctx.fillStyle = briefGrad;
ctx.fill();
setOutline(4);
ctx.stroke();

// Stitching
ctx.beginPath();
ctx.moveTo(-42, 0);
ctx.lineTo(42, 0);
ctx.strokeStyle = '#4a3018';
ctx.lineWidth = 2;
ctx.stroke();
// Clasps
ctx.beginPath();
ctx.roundRect(-15, -5, 10, 10, 2);
ctx.roundRect(5, -5, 10, 10, 2);
ctx.fillStyle = '#b8a060';
ctx.fill();
ctx.strokeStyle = '#8a7040';
ctx.lineWidth = 1.5;
ctx.stroke();
// Handle
ctx.beginPath();
ctx.moveTo(-18, -40);
ctx.quadraticCurveTo(0, -56, 18, -40);
ctx.strokeStyle = '#3a2818';
ctx.lineWidth = 6;
ctx.lineCap = 'round';
ctx.stroke();

// IMPACT EFFECT on briefcase!
softCircle(30, -10, 40, '#8a6ad4', 0.3);
// Splash marks
for (let i = 0; i < 6; i++) {
  const angle = -Math.PI * 0.3 + i * 0.4;
  const dist = 35 + Math.random() * 20;
  ctx.beginPath();
  ctx.arc(30 + Math.cos(angle) * dist, -10 + Math.sin(angle) * dist, 3 + Math.random() * 4, 0, Math.PI * 2);
  ctx.fillStyle = hsl(270, 60, 50, 0.3 + Math.random() * 0.2);
  ctx.fill();
}

ctx.restore();

// Hand gripping
ctx.beginPath();
ctx.ellipse(sx + 125, sy - 75, 12, 10, -0.3, 0, Math.PI * 2);
ctx.fillStyle = '#c8a882';
ctx.fill();
setOutline(2.5);
ctx.stroke();

// ---- LEFT ARM: Holding calculator ----
ctx.beginPath();
ctx.moveTo(sx - 55, sy + 15);
ctx.quadraticCurveTo(sx - 80, sy + 60, sx - 70, sy + 100);
ctx.strokeStyle = '#4a6a4a';
ctx.lineWidth = 26;
ctx.lineCap = 'round';
ctx.stroke();
ctx.beginPath();
ctx.moveTo(sx - 72, sy + 90);
ctx.quadraticCurveTo(sx - 68, sy + 120, sx - 60, sy + 140);
ctx.strokeStyle = '#c8a882';
ctx.lineWidth = 18;
ctx.lineCap = 'round';
ctx.stroke();

// Calculator
ctx.save();
ctx.translate(sx - 58, sy + 145);
ctx.rotate(0.1);
ctx.beginPath();
ctx.roundRect(-14, -4, 28, 38, 3);
ctx.fillStyle = '#2a2a2a';
ctx.fill();
ctx.strokeStyle = '#1a1a1a';
ctx.lineWidth = 2;
ctx.stroke();
// Screen
ctx.beginPath();
ctx.rect(-10, 0, 20, 10);
ctx.fillStyle = '#6a8a6a';
ctx.fill();
// "666" on screen (devil's number, he doesn't notice)
ctx.font = 'bold 8px monospace';
ctx.fillStyle = '#1a3a1a';
ctx.fillText('-$2,400', -8, 8);
// Buttons
for (let r = 0; r < 3; r++) {
  for (let c2 = 0; c2 < 3; c2++) {
    ctx.beginPath();
    ctx.arc(-6 + c2 * 6, 16 + r * 6, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#4a4a4a';
    ctx.fill();
  }
}
ctx.restore();

// ---- NECK ----
ctx.beginPath();
ctx.moveTo(sx - 12, sy - 12);
ctx.lineTo(sx - 14, sy + 8);
ctx.lineTo(sx + 14, sy + 8);
ctx.lineTo(sx + 12, sy - 12);
ctx.closePath();
ctx.fillStyle = '#c8a882';
ctx.fill();
setOutline(2.5);
ctx.stroke();

// ---- HEAD ----
ctx.beginPath();
ctx.moveTo(sx - 40, sy - 60);
ctx.quadraticCurveTo(sx - 45, sy - 110, sx - 30, sy - 138);
ctx.quadraticCurveTo(sx - 15, sy - 158, sx, sy - 160);
ctx.quadraticCurveTo(sx + 15, sy - 158, sx + 30, sy - 138);
ctx.quadraticCurveTo(sx + 45, sy - 110, sx + 40, sy - 60);
ctx.quadraticCurveTo(sx + 38, sy - 30, sx + 25, sy - 10);
ctx.quadraticCurveTo(sx + 12, sy + 5, sx, sy + 8);
ctx.quadraticCurveTo(sx - 12, sy + 5, sx - 25, sy - 10);
ctx.quadraticCurveTo(sx - 38, sy - 30, sx - 40, sy - 60);
ctx.closePath();
ctx.fillStyle = '#d4b492';
ctx.fill();
setOutline(3.5);
ctx.stroke();

// Hair
ctx.beginPath();
ctx.moveTo(sx - 36, sy - 65);
ctx.quadraticCurveTo(sx - 42, sy - 110, sx - 28, sy - 135);
ctx.quadraticCurveTo(sx - 14, sy - 155, sx, sy - 156);
ctx.quadraticCurveTo(sx + 14, sy - 155, sx + 28, sy - 135);
ctx.quadraticCurveTo(sx + 42, sy - 110, sx + 36, sy - 65);
ctx.quadraticCurveTo(sx + 30, sy - 85, sx, sy - 95);
ctx.quadraticCurveTo(sx - 30, sy - 85, sx - 36, sy - 65);
ctx.closePath();
ctx.fillStyle = '#5a4830';
ctx.fill();
setOutline(2.5);
ctx.stroke();

// Ears
ctx.beginPath();
ctx.ellipse(sx - 42, sy - 50, 8, 14, -0.1, 0, Math.PI * 2);
ctx.fillStyle = '#d4b492';
ctx.fill();
setOutline(2.5);
ctx.stroke();
ctx.beginPath();
ctx.ellipse(sx + 42, sy - 50, 8, 14, 0.1, 0, Math.PI * 2);
ctx.fillStyle = '#d4b492';
ctx.fill();
setOutline(2.5);
ctx.stroke();

// Glasses
ctx.beginPath();
ctx.roundRect(sx - 34, sy - 68, 28, 22, 4);
ctx.roundRect(sx + 6, sy - 68, 28, 22, 4);
ctx.moveTo(sx - 6, sy - 56);
ctx.quadraticCurveTo(sx, sy - 60, sx + 6, sy - 56);
ctx.strokeStyle = '#4a4a4a';
ctx.lineWidth = 2.5;
ctx.stroke();

// One lens cracked! (from previous hits)
ctx.beginPath();
ctx.moveTo(sx + 12, sy - 66);
ctx.lineTo(sx + 22, sy - 54);
ctx.moveTo(sx + 18, sy - 64);
ctx.lineTo(sx + 26, sy - 56);
ctx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
ctx.lineWidth = 1;
ctx.stroke();

// Eyes — determined/stressed
ctx.beginPath();
ctx.ellipse(sx - 20, sy - 55, 8, 6, 0, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();
ctx.strokeStyle = '#2a1810';
ctx.lineWidth = 1.5;
ctx.stroke();
ctx.beginPath();
ctx.arc(sx - 19, sy - 54, 5, 0, Math.PI * 2);
ctx.fillStyle = '#5a7a5a';
ctx.fill();
ctx.beginPath();
ctx.arc(sx - 19, sy - 54, 2.5, 0, Math.PI * 2);
ctx.fillStyle = '#1a1a1a';
ctx.fill();
ctx.beginPath();
ctx.arc(sx - 17, sy - 57, 1.5, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();

ctx.beginPath();
ctx.ellipse(sx + 20, sy - 55, 8, 6, 0, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();
ctx.strokeStyle = '#2a1810';
ctx.lineWidth = 1.5;
ctx.stroke();
ctx.beginPath();
ctx.arc(sx + 21, sy - 54, 5, 0, Math.PI * 2);
ctx.fillStyle = '#5a7a5a';
ctx.fill();
ctx.beginPath();
ctx.arc(sx + 21, sy - 54, 2.5, 0, Math.PI * 2);
ctx.fillStyle = '#1a1a1a';
ctx.fill();
ctx.beginPath();
ctx.arc(sx + 23, sy - 57, 1.5, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();

// Eyebrows: one raised, one furrowed
ctx.beginPath();
ctx.moveTo(sx - 32, sy - 78);
ctx.quadraticCurveTo(sx - 20, sy - 84, sx - 8, sy - 74);
ctx.strokeStyle = '#4a3820';
ctx.lineWidth = 4;
ctx.lineCap = 'round';
ctx.stroke();
ctx.beginPath();
ctx.moveTo(sx + 8, sy - 78);
ctx.quadraticCurveTo(sx + 20, sy - 82, sx + 32, sy - 76);
ctx.stroke();

// Nose
ctx.beginPath();
ctx.moveTo(sx, sy - 50);
ctx.quadraticCurveTo(sx - 2, sy - 38, sx - 5, sy - 32);
ctx.quadraticCurveTo(sx, sy - 28, sx + 5, sy - 32);
ctx.strokeStyle = '#b08868';
ctx.lineWidth = 2;
ctx.stroke();

// Mouth: gritted teeth
ctx.beginPath();
ctx.moveTo(sx - 14, sy - 18);
ctx.lineTo(sx + 14, sy - 18);
ctx.strokeStyle = '#8a5a4a';
ctx.lineWidth = 2.5;
ctx.stroke();
// Teeth showing
ctx.beginPath();
ctx.moveTo(sx - 10, sy - 18);
ctx.lineTo(sx + 10, sy - 18);
ctx.strokeStyle = 'rgba(240, 230, 220, 0.4)';
ctx.lineWidth = 3;
ctx.stroke();
ctx.beginPath();
ctx.moveTo(sx - 10, sy - 18);
ctx.lineTo(sx + 10, sy - 18);
ctx.strokeStyle = '#8a5a4a';
ctx.lineWidth = 0.5;
ctx.stroke();

// Sweat drop (anime style!)
ctx.beginPath();
ctx.moveTo(sx + 38, sy - 80);
ctx.quadraticCurveTo(sx + 42, sy - 72, sx + 38, sy - 64);
ctx.quadraticCurveTo(sx + 34, sy - 72, sx + 38, sy - 80);
ctx.fillStyle = '#6a9ad4';
ctx.globalAlpha = 0.6;
ctx.fill();
ctx.globalAlpha = 1;
ctx.beginPath();
ctx.arc(sx + 38, sy - 74, 1.5, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();

// ============================
// OIL WARRIOR (right side, attacking pose)
// ============================
const ox = 1100, oy = 300;

// Shadow
ctx.save();
ctx.translate(ox, groundY + 10);
ctx.scale(1, 0.12);
ctx.beginPath();
ctx.arc(0, 0, 120, 0, Math.PI * 2);
ctx.fillStyle = 'rgba(0,0,0,0.25)';
ctx.fill();
ctx.restore();

// ---- Flowing skirt / legs ----
ctx.beginPath();
ctx.moveTo(ox - 30, oy + 170);
ctx.quadraticCurveTo(ox - 50, oy + 240, ox - 60, oy + 310);
ctx.quadraticCurveTo(ox - 40, oy + 320, ox, oy + 315);
ctx.quadraticCurveTo(ox + 40, oy + 320, ox + 60, oy + 310);
ctx.quadraticCurveTo(ox + 50, oy + 240, ox + 30, oy + 170);
ctx.closePath();
const skirtGrad = ctx.createLinearGradient(ox, oy + 170, ox, oy + 320);
skirtGrad.addColorStop(0, '#d46a8a');
skirtGrad.addColorStop(1, '#a04868');
ctx.fillStyle = skirtGrad;
ctx.fill();
setOutline(3);
ctx.stroke();

// Skirt folds
ctx.beginPath();
ctx.moveTo(ox - 15, oy + 180);
ctx.quadraticCurveTo(ox - 20, oy + 250, ox - 18, oy + 310);
ctx.moveTo(ox + 10, oy + 175);
ctx.quadraticCurveTo(ox + 15, oy + 250, ox + 12, oy + 310);
ctx.strokeStyle = 'rgba(120, 40, 60, 0.4)';
ctx.lineWidth = 1.5;
ctx.stroke();

// Sandaled feet
ctx.beginPath();
ctx.ellipse(ox - 20, oy + 315, 15, 6, -0.2, 0, Math.PI * 2);
ctx.fillStyle = '#c8a882';
ctx.fill();
setOutline(2);
ctx.stroke();
ctx.beginPath();
ctx.ellipse(ox + 25, oy + 312, 15, 6, 0.2, 0, Math.PI * 2);
ctx.fillStyle = '#c8a882';
ctx.fill();
setOutline(2);
ctx.stroke();

// ---- TORSO (flowy tank top) ----
ctx.beginPath();
ctx.moveTo(ox - 45, oy + 10);
ctx.quadraticCurveTo(ox - 48, oy + 100, ox - 32, oy + 175);
ctx.lineTo(ox + 32, oy + 175);
ctx.quadraticCurveTo(ox + 48, oy + 100, ox + 45, oy + 10);
ctx.closePath();
const topGrad = ctx.createLinearGradient(ox, oy, ox, oy + 175);
topGrad.addColorStop(0, '#d8c8b8');
topGrad.addColorStop(1, '#c8b8a0');
ctx.fillStyle = topGrad;
ctx.fill();
setOutline(3);
ctx.stroke();

// Tank top straps
ctx.beginPath();
ctx.moveTo(ox - 20, oy + 10);
ctx.lineTo(ox - 25, oy - 20);
ctx.moveTo(ox + 20, oy + 10);
ctx.lineTo(ox + 25, oy - 20);
ctx.strokeStyle = '#c8b8a0';
ctx.lineWidth = 6;
ctx.lineCap = 'round';
ctx.stroke();
setOutline(2);
ctx.stroke();

// doTERRA lanyard
ctx.beginPath();
ctx.moveTo(ox - 10, oy - 20);
ctx.quadraticCurveTo(ox, oy + 20, ox + 10, oy - 20);
ctx.strokeStyle = '#6a4a8a';
ctx.lineWidth = 3;
ctx.stroke();
// Badge
ctx.beginPath();
ctx.roundRect(ox - 12, oy + 15, 24, 16, 2);
ctx.fillStyle = '#8a6ad4';
ctx.fill();
ctx.strokeStyle = '#5a3a8a';
ctx.lineWidth = 1.5;
ctx.stroke();
ctx.font = 'bold 6px sans-serif';
ctx.fillStyle = '#ffffff';
ctx.textAlign = 'center';
ctx.fillText('doTERRA', ox, oy + 26);
ctx.font = '5px sans-serif';
ctx.fillText('Wellness Advocate', ox, oy + 32);

// ---- THROWING ARM (left, hurling oil bottle) ----
ctx.beginPath();
ctx.moveTo(ox - 45, oy + 15);
ctx.quadraticCurveTo(ox - 100, oy - 30, ox - 160, oy - 60);
ctx.quadraticCurveTo(ox - 200, oy - 80, ox - 230, oy - 70);
ctx.strokeStyle = '#c8a882';
ctx.lineWidth = 22;
ctx.lineCap = 'round';
ctx.stroke();
setOutline(3);
ctx.beginPath();
ctx.moveTo(ox - 35, oy + 8);
ctx.quadraticCurveTo(ox - 100, oy - 40, ox - 160, oy - 70);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(ox - 55, oy + 20);
ctx.quadraticCurveTo(ox - 110, oy - 20, ox - 160, oy - 50);
ctx.stroke();

// Hand open from release
ctx.beginPath();
ctx.ellipse(ox - 235, oy - 72, 14, 12, -0.5, 0, Math.PI * 2);
ctx.fillStyle = '#c8a882';
ctx.fill();
setOutline(2.5);
ctx.stroke();
// Fingers spread from throwing
for (let i = 0; i < 4; i++) {
  const angle = -2.2 + i * 0.35;
  ctx.beginPath();
  ctx.moveTo(ox - 235 + Math.cos(angle) * 12, oy - 72 + Math.sin(angle) * 10);
  ctx.lineTo(ox - 235 + Math.cos(angle) * 24, oy - 72 + Math.sin(angle) * 18);
  ctx.strokeStyle = '#c8a882';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
  setOutline(2);
  ctx.stroke();
}

// ---- THE FLYING OIL BOTTLE ----
ctx.save();
ctx.translate(ox - 380, oy - 90);
ctx.rotate(-0.5);

// Bottle
ctx.beginPath();
ctx.roundRect(-8, -20, 16, 30, 5);
ctx.fillStyle = '#8a6ad4';
ctx.fill();
setOutline(2.5, '#5a3a8a');
ctx.stroke();
// Bottle neck
ctx.beginPath();
ctx.roundRect(-4, -28, 8, 12, 3);
ctx.fillStyle = '#9a7ae4';
ctx.fill();
setOutline(2, '#5a3a8a');
ctx.stroke();
// Cap
ctx.beginPath();
ctx.roundRect(-5, -32, 10, 6, 2);
ctx.fillStyle = '#d4a34a';
ctx.fill();
// Label
ctx.font = 'bold 5px sans-serif';
ctx.fillStyle = '#ffffff';
ctx.textAlign = 'center';
ctx.fillText('LAVENDER', 0, -6);
ctx.fillText('SERENITY', 0, 0);

ctx.restore();

// Oil trail from bottle
for (let i = 0; i < 20; i++) {
  const t = i / 20;
  const tx = ox - 235 + (ox - 380 - (ox - 235)) * t;
  const ty = oy - 72 + (oy - 90 - (oy - 72)) * t;
  ctx.beginPath();
  ctx.arc(tx + Math.random() * 10 - 5, ty + Math.random() * 10 - 5, 2 + Math.random() * 3, 0, Math.PI * 2);
  ctx.fillStyle = hsl(270, 50, 50, 0.1 + t * 0.15);
  ctx.fill();
}

// Smell lines (wavy purple)
for (let i = 0; i < 5; i++) {
  ctx.beginPath();
  const startX = ox - 400 + i * 15;
  for (let j = 0; j < 10; j++) {
    const px = startX - j * 15;
    const py = oy - 90 + Math.sin(j * 0.8 + i) * 12 - j * 3;
    if (j === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = hsl(280, 40, 50, 0.08 + i * 0.02);
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ---- OTHER ARM: Holding tote bag of bottles ----
ctx.beginPath();
ctx.moveTo(ox + 45, oy + 15);
ctx.quadraticCurveTo(ox + 70, oy + 60, ox + 65, oy + 110);
ctx.strokeStyle = '#c8a882';
ctx.lineWidth = 22;
ctx.lineCap = 'round';
ctx.stroke();
setOutline(3);
ctx.beginPath();
ctx.moveTo(ox + 35, oy + 10);
ctx.quadraticCurveTo(ox + 58, oy + 60, ox + 53, oy + 112);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(ox + 55, oy + 18);
ctx.quadraticCurveTo(ox + 82, oy + 60, ox + 77, oy + 108);
ctx.stroke();

// Tote bag
ctx.beginPath();
ctx.moveTo(ox + 50, oy + 105);
ctx.lineTo(ox + 45, oy + 170);
ctx.lineTo(ox + 95, oy + 170);
ctx.lineTo(ox + 90, oy + 105);
ctx.closePath();
ctx.fillStyle = '#c8bca0';
ctx.fill();
setOutline(2);
ctx.stroke();
// Handle
ctx.beginPath();
ctx.moveTo(ox + 55, oy + 105);
ctx.quadraticCurveTo(ox + 70, oy + 90, ox + 85, oy + 105);
ctx.strokeStyle = '#a0947a';
ctx.lineWidth = 3;
ctx.stroke();
// Bottles peeking out
for (let i = 0; i < 3; i++) {
  ctx.beginPath();
  ctx.roundRect(ox + 52 + i * 13, oy + 95, 10, 15, 3);
  ctx.fillStyle = hsl(270 + i * 20, 50, 50, 0.7);
  ctx.fill();
  ctx.strokeStyle = '#3a2a4a';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ---- NECK ----
ctx.beginPath();
ctx.moveTo(ox - 12, oy - 30);
ctx.lineTo(ox - 14, oy - 8);
ctx.lineTo(ox + 14, oy - 8);
ctx.lineTo(ox + 12, oy - 30);
ctx.fillStyle = '#c8a882';
ctx.fill();
setOutline(2.5);
ctx.stroke();

// Crystal necklace
ctx.beginPath();
ctx.moveTo(ox - 10, oy - 15);
ctx.quadraticCurveTo(ox, oy - 5, ox + 10, oy - 15);
ctx.strokeStyle = '#8a6ad4';
ctx.lineWidth = 2;
ctx.stroke();
// Crystal pendant
ctx.beginPath();
ctx.moveTo(ox - 5, oy - 5);
ctx.lineTo(ox, oy + 8);
ctx.lineTo(ox + 5, oy - 5);
ctx.closePath();
ctx.fillStyle = '#8a6ad4';
ctx.globalAlpha = 0.7;
ctx.fill();
ctx.globalAlpha = 1;
ctx.strokeStyle = '#5a3a8a';
ctx.lineWidth = 1.5;
ctx.stroke();

// ---- HEAD ----
ctx.beginPath();
ctx.ellipse(ox, oy - 60, 38, 44, 0, 0, Math.PI * 2);
ctx.fillStyle = '#d4b492';
ctx.fill();
setOutline(3.5);
ctx.stroke();

// Hair: flowing, wild, mid-action
ctx.beginPath();
ctx.moveTo(ox - 38, oy - 60);
ctx.quadraticCurveTo(ox - 42, oy - 100, ox - 25, oy - 110);
ctx.quadraticCurveTo(ox, oy - 118, ox + 25, oy - 110);
ctx.quadraticCurveTo(ox + 42, oy - 100, ox + 38, oy - 60);
// Hair flowing in wind from throw
ctx.quadraticCurveTo(ox + 55, oy - 70, ox + 70, oy - 85);
ctx.quadraticCurveTo(ox + 85, oy - 95, ox + 100, oy - 80);
ctx.quadraticCurveTo(ox + 90, oy - 60, ox + 80, oy - 45);
ctx.quadraticCurveTo(ox + 60, oy - 35, ox + 38, oy - 45);
// Also flows left
ctx.moveTo(ox - 38, oy - 60);
ctx.quadraticCurveTo(ox - 55, oy - 50, ox - 65, oy - 40);
ctx.quadraticCurveTo(ox - 70, oy - 30, ox - 55, oy - 25);
ctx.quadraticCurveTo(ox - 42, oy - 30, ox - 38, oy - 45);

const hairGrad = ctx.createLinearGradient(ox - 50, oy - 120, ox + 100, oy - 30);
hairGrad.addColorStop(0, '#6a3828');
hairGrad.addColorStop(0.5, '#7a4430');
hairGrad.addColorStop(1, '#5a2818');
ctx.fillStyle = hairGrad;
ctx.fill();
setOutline(3);
ctx.stroke();

// Headband
ctx.beginPath();
ctx.ellipse(ox, oy - 80, 42, 15, 0, Math.PI, Math.PI * 2);
ctx.strokeStyle = '#d46a8a';
ctx.lineWidth = 5;
ctx.stroke();
// Headband gem
ctx.beginPath();
ctx.arc(ox, oy - 95, 5, 0, Math.PI * 2);
ctx.fillStyle = '#d46a8a';
ctx.fill();
ctx.strokeStyle = '#a04868';
ctx.lineWidth = 1.5;
ctx.stroke();

// Eyes: intense, mid-attack, still smiling
ctx.beginPath();
ctx.ellipse(ox - 14, oy - 62, 10, 8, 0, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();
ctx.strokeStyle = '#2a1810';
ctx.lineWidth = 2;
ctx.stroke();
ctx.beginPath();
ctx.arc(ox - 13, oy - 61, 5.5, 0, Math.PI * 2);
const oirisGrad = ctx.createRadialGradient(ox - 13, oy - 61, 0, ox - 13, oy - 61, 5.5);
oirisGrad.addColorStop(0, '#8a6ad4');
oirisGrad.addColorStop(1, '#5a3a8a');
ctx.fillStyle = oirisGrad;
ctx.fill();
ctx.beginPath();
ctx.arc(ox - 13, oy - 61, 2.5, 0, Math.PI * 2);
ctx.fillStyle = '#1a1a1a';
ctx.fill();
ctx.beginPath();
ctx.arc(ox - 11, oy - 64, 2, 0, Math.PI * 2);
ctx.fillStyle = '#ffffffcc';
ctx.fill();

ctx.beginPath();
ctx.ellipse(ox + 14, oy - 62, 10, 8, 0, 0, Math.PI * 2);
ctx.fillStyle = '#ffffff';
ctx.fill();
ctx.strokeStyle = '#2a1810';
ctx.lineWidth = 2;
ctx.stroke();
ctx.beginPath();
ctx.arc(ox + 15, oy - 61, 5.5, 0, Math.PI * 2);
ctx.fillStyle = oirisGrad;
ctx.fill();
ctx.beginPath();
ctx.arc(ox + 15, oy - 61, 2.5, 0, Math.PI * 2);
ctx.fillStyle = '#1a1a1a';
ctx.fill();
ctx.beginPath();
ctx.arc(ox + 17, oy - 64, 2, 0, Math.PI * 2);
ctx.fillStyle = '#ffffffcc';
ctx.fill();

// Eyelids — slightly narrowed, confident
ctx.beginPath();
ctx.moveTo(ox - 26, oy - 68);
ctx.quadraticCurveTo(ox - 14, oy - 72, ox - 4, oy - 66);
ctx.strokeStyle = '#2a1810';
ctx.lineWidth = 3;
ctx.stroke();
ctx.beginPath();
ctx.moveTo(ox + 4, oy - 66);
ctx.quadraticCurveTo(ox + 14, oy - 72, ox + 26, oy - 68);
ctx.stroke();

// Eyebrows: arched, confident
ctx.beginPath();
ctx.moveTo(ox - 28, oy - 82);
ctx.quadraticCurveTo(ox - 14, oy - 86, ox - 2, oy - 78);
ctx.strokeStyle = '#5a3020';
ctx.lineWidth = 3.5;
ctx.lineCap = 'round';
ctx.stroke();
ctx.beginPath();
ctx.moveTo(ox + 2, oy - 78);
ctx.quadraticCurveTo(ox + 14, oy - 86, ox + 28, oy - 82);
ctx.stroke();

// Nose
ctx.beginPath();
ctx.moveTo(ox, oy - 55);
ctx.quadraticCurveTo(ox - 3, oy - 42, ox - 6, oy - 38);
ctx.quadraticCurveTo(ox, oy - 34, ox + 6, oy - 38);
ctx.strokeStyle = '#b08868';
ctx.lineWidth = 2;
ctx.stroke();

// SMILE: big, genuine-looking, still smiling while attacking
ctx.beginPath();
ctx.moveTo(ox - 18, oy - 28);
ctx.quadraticCurveTo(ox, oy - 16, ox + 18, oy - 28);
ctx.strokeStyle = '#8a5a4a';
ctx.lineWidth = 3;
ctx.stroke();
// Teeth
ctx.beginPath();
ctx.moveTo(ox - 14, oy - 27);
ctx.quadraticCurveTo(ox, oy - 18, ox + 14, oy - 27);
ctx.fillStyle = 'rgba(240, 230, 220, 0.5)';
ctx.fill();

// ============================
// IMPACT FX: Between them
// ============================
// Purple oil splash impact on briefcase area
softCircle(sx + 160, sy - 80, 80, '#8a6ad4', 0.15);

// Action text (manga-style)
ctx.save();
ctx.translate(780, 150);
ctx.rotate(-0.1);
ctx.font = 'bold italic 48px Georgia, serif';
ctx.fillStyle = '#d4a34a';
ctx.globalAlpha = 0.25;
ctx.textAlign = 'center';
ctx.fillText('ANOINT!', 0, 0);
ctx.globalAlpha = 1;
ctx.restore();

// Damage number floating
ctx.save();
ctx.translate(sx + 80, sy - 160);
ctx.font = 'bold 64px Georgia, serif';
ctx.fillStyle = '#d46a8a';
ctx.globalAlpha = 0.7;
ctx.textAlign = 'center';
ctx.fillText('-8', 0, 0);
ctx.font = 'italic 18px Georgia, serif';
ctx.fillStyle = '#877a5a';
ctx.fillText('poison + confusion', 0, 24);
ctx.globalAlpha = 1;
ctx.restore();

// ============================
// VIGNETTE
// ============================
const vignette = ctx.createRadialGradient(W/2, H/2, 200, W/2, H/2, 1000);
vignette.addColorStop(0, 'rgba(0,0,0,0)');
vignette.addColorStop(0.6, 'rgba(0,0,0,0)');
vignette.addColorStop(1, 'rgba(0,0,0,0.6)');
ctx.fillStyle = vignette;
ctx.fillRect(0, 0, W, H);

// ============================
// TEXT
// ============================
ctx.save();
ctx.font = 'bold 32px Georgia, serif';
ctx.fillStyle = '#d4a34a';
ctx.textAlign = 'center';
ctx.fillText('S T E V E   vs.   O I L   W A R R I O R', W/2, H - 60);

ctx.font = 'italic 16px Georgia, serif';
ctx.fillStyle = '#877a5a';
ctx.fillText('"It smells like a candle store on fire."', W/2, H - 30);
ctx.restore();

</script>
</body>
